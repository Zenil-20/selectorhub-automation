# Render Blueprint — Anchor backend with Turso for persistence.
#
# After pushing this repo to GitHub:
#   https://render.com/deploy?repo=https://github.com/<you>/<repo>
#
# Render reads this file, provisions the free web service, then asks you
# to fill in the secret env vars marked `sync: false` below.
#
# Persistence is via Turso (free tier — 9 GB / 1B reads). Render's free
# tier has no persistent disk, but Turso is a separate managed SQLite
# service so the SQLite file lives there, not on Render's ephemeral disk.
#
# Setup before deploying:
#   1. Sign up at https://turso.tech
#   2. `turso db create anchor`
#   3. Get the URL:    turso db show anchor --url        → ANCHOR_DB_URL
#   4. Get the token:  turso db tokens create anchor     → ANCHOR_DB_AUTH_TOKEN
#   5. Sign up Groq (https://console.groq.com) and grab a key
#                                                        → ANCHOR_LLM_API_KEY
services:
  - type: web
    name: anchor
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # ---- secrets (Render prompts for these in the dashboard) ----
      - key: ANCHOR_DB_URL
        sync: false
      - key: ANCHOR_DB_AUTH_TOKEN
        sync: false
      - key: ANCHOR_LLM_API_KEY
        sync: false
      # ---- non-secret defaults ----
      - key: ANCHOR_LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: ANCHOR_LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: ANCHOR_DEFAULT_DAILY_BUDGET_USD
        value: "5"
      - key: ANCHOR_LLM_RPM
        value: "25"
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: "10000"
      - key: ANCHOR_ALLOWED_ORIGINS
        value: ""
